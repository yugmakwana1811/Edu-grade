name: Quality gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/edugrade
          AUTH_SECRET: ci-only-not-used-for-runtime-000000000000
      - run: npm audit --omit=dev --audit-level=high
