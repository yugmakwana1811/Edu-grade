<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200"><rect width="900" height="1200" fill="#fffdf7"/><g stroke="#d8e5ee" stroke-width="1"> <path d="M70 130H840M70 180H840M70 230H840M70 280H840M70 330H840M70 380H840M70 430H840M70 480H840M70 530H840M70 580H840M70 630H840M70 680H840M70 730H840M70 780H840M70 830H840M70 880H840M70 930H840M70 980H840M70 1030H840"/></g><path d="M110 70V1120" stroke="#ef9a9a" stroke-width="2"/><g fill="#243a55" font-family="cursive" font-size="26" font-style="italic"><text x="140" y="115">Partnership Fundamentals Test</text><text x="140" y="170">Q1. Profit and Loss Appropriation Account</text><text x="140" y="220">Net profit = ₹1,20,000</text><text x="140" y="270">Less: Interest on capital: A ₹12,000; B ₹8,000</text><text x="140" y="320">Less: Partner salary (A) = ₹24,000</text><text x="140" y="370">Balance profit = ₹76,000, shared equally</text><text x="140" y="470">A's share = ₹38,000 + ₹12,000 + ₹24,000</text><text x="140" y="520">B's share = ₹38,000 + ₹8,000</text><text x="140" y="640">Q2. Interest on drawings is credited to the</text><text x="140" y="690">Profit &amp; Loss Appropriation Account.</text><text x="140" y="790">Working: Average period = 6 months</text><text x="140" y="840">₹24,000 × 10/100 × 6/12 = ₹1,200</text></g><text x="740" y="1150" fill="#607d8b" font-family="sans-serif" font-size="18">Page 1</text></svg>
